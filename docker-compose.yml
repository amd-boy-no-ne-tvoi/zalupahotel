version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: pet-hotel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pet_hotel}
      POSTGRES_USER: ${POSTGRES_USER:-pethotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pethotel} -d ${POSTGRES_DB:-pet_hotel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pet-hotel-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pethotel}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pet_hotel}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/apps/backend/uploads
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: pet-hotel-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
  uploads:
